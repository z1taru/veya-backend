spring:
  application:
    name: veya-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/veya}
    username: ${SPRING_DATASOURCE_USERNAME:veya}
    password: ${SPRING_DATASOURCE_PASSWORD:veya_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:veya-super-secret-jwt-key-change-in-production-min-256-bits}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000} # 15 min
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

logging:
  level:
    root: INFO
    com.veya: DEBUG
    org.springframework.security: INFO
